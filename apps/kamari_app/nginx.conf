server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: every route falls back to index.html so deep links (/developer, /guardian) work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The PWA service worker must never be cached, so updates ship immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
