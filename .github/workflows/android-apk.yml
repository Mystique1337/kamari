name: Build Android APK

# Produces an installable Kamari APK you can download from the run's Artifacts.
# Run it from the Actions tab (Run workflow), or it runs on pushes that touch the app.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/kamari_app/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/kamari_app
    env:
      # Set these as repo secrets so the bundled app talks to your live services.
      # Without them the app builds in mock mode (still installable and demoable).
      VITE_KAMARI_API_URL: ${{ secrets.VITE_KAMARI_API_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Assemble debug APK
        working-directory: apps/kamari_app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kamari-android-debug
          path: apps/kamari_app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
