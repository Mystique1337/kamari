name: CI

# Lint/test the gateway and build the app on every push and PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: Gateway (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
      - run: PYTHONPATH=. pytest -q

  web:
    name: App (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/kamari_app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
